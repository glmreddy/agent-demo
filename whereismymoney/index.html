<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>whereismymoney — Personal Finance</title>
<meta name="description" content="Automatic classification of credit-card and bank spend into budget categories, with reporting, planning and trend analysis." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>" />
<link rel="stylesheet" href="css/styles.css" />

<!-- Chart.js (UMD, global `Chart`) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<!-- SheetJS (UMD, global `XLSX`) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<section id="view-login" class="login-screen">
  <div class="login-card">
    <div class="login-logo">💰</div>
    <h1>whereismymoney</h1>
    <p class="login-tagline">Know exactly where your money goes — automatically classified, budgeted, and tracked.</p>
    <button id="btn-google-signin" class="btn btn-google" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.4-.1-2.7-.4-4.5z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3 16.3 3 9.7 7.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 45c5.5 0 10.4-1.9 14.3-5.1l-6.6-5.6C29.6 36 26.9 37 24 37c-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.5 40.6 16.2 45 24 45z"/>
        <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.6 5.6C39.9 37 43 30.9 43 24c0-1.4-.1-2.7-.4-4.5z"/>
      </svg>
      Sign in with Google
    </button>
    <p id="login-error" class="login-error" hidden></p>
  </div>
</section>

<!-- ============ APP SHELL (hidden until signed in) ============ -->
<div id="app-shell" hidden>

  <button id="btn-nav-toggle" class="nav-toggle" type="button" aria-label="Toggle navigation">☰</button>

  <nav id="app-nav" class="app-nav">
    <div class="nav-brand">💰 <span>whereismymoney</span></div>
    <ul class="nav-list">
      <li><button class="nav-link" data-view="dashboard" type="button"><span class="nav-icon">📊</span>Dashboard</button></li>
      <li><button class="nav-link" data-view="transactions" type="button"><span class="nav-icon">🧾</span>Transactions</button></li>
      <li><button class="nav-link" data-view="reports" type="button"><span class="nav-icon">📈</span>Income &amp; Expense</button></li>
      <li><button class="nav-link" data-view="payment-cycles" type="button"><span class="nav-icon">🔁</span>Payment Cycles</button></li>
      <li><button class="nav-link" data-view="budget" type="button"><span class="nav-icon">🎯</span>Budget Planner</button></li>
      <li><button class="nav-link" data-view="category-mapping" type="button"><span class="nav-icon">🏷️</span>Category Mapping</button></li>
      <li><button class="nav-link" data-view="import" type="button"><span class="nav-icon">📥</span>Import</button></li>
    </ul>
    <div class="nav-footer">
      <div class="nav-user">
        <img id="user-avatar" class="user-avatar" src="" alt="" hidden />
        <div class="user-info">
          <div id="user-name" class="user-name">—</div>
          <div id="user-email" class="user-email">—</div>
        </div>
      </div>
      <button id="btn-signout" class="btn btn-signout" type="button">Sign out</button>
    </div>
  </nav>

  <main id="app-main" class="app-main">
    <div id="toast-container" class="toast-container"></div>
    <div id="save-indicator" class="save-indicator" hidden>Saving…</div>

    <section id="view-dashboard" class="view"></section>
    <section id="view-transactions" class="view"></section>
    <section id="view-reports" class="view"></section>
    <section id="view-payment-cycles" class="view"></section>
    <section id="view-budget" class="view"></section>
    <section id="view-category-mapping" class="view"></section>
    <section id="view-import" class="view"></section>
  </main>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
